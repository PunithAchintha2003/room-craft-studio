# Deploy client (and optionally other frontends) to Vercel on push to main.
# Requires GitHub secrets: VERCEL_TOKEN, VERCEL_PROJECT_ID, VERCEL_USER_ID

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-client:
    name: Deploy client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Install and build (client)
        env:
          VITE_API_URL: https://room-craft-studio.onrender.com/api
          VITE_WS_URL: https://room-craft-studio.onrender.com
        run: |
          cd client
          npm ci
          npm run build

      - name: Deploy to Vercel
        working-directory: client
        run: vercel deploy --prod --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"
